<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 10px;
        }
        h1 {
            color: #53d508;
            text-align: center;
            text-shadow: 2px 2px 2px #ffffff;
            border: 2px solid #53d508;
            border-radius: 10px;

        }
        p {
            font-size: 16px;
            line-height: 1.5;
            text-align: justify;
            text-indent: 20px;
            text-shadow: 1px 1px 1px #000000;
        }
        em {
            font-style: italic;
            color: #9dff00;
            text-shadow: 12px 12px 12px #000000;
            text-align: center;
            border: 2px solid #9dff00;
            border-radius: 10px;
        }
        h2 {
            color: #d50808;
            text-align: center;
            text-shadow: 2px 2px 2px #000000;
            border: 2px solid #000000;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Hello, World!</h1>
    <h2>This is a subheading.</h2>
    <p>This is a paragraph.</p>
    <hr>
    <p>This is another paragraph.</p>
    <hr>
    <h1>Welcome to My Website</h1>
    <em>This is a sample website created using HTML and CSS. You can customize the styles and content as per your requirements.</em>
    <a href="index06.html"><h2>Visit My Next Page</h2></a>
</body>
</html>
